<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGV Ultra - Mobile Ready</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.7);
            --red: #ef4444; --gold: #fbbf24; --green: #10b981; --text: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: row; min-height: 100vh; }
        
        /* BARRA LATERAL (DESKTOP) */
        aside { width: 260px; background: #020617; padding: 30px; position: fixed; height: 100vh; border-right: 1px solid #1e293b; z-index: 100; transition: 0.3s; }
        .nav-links { list-style: none; margin-top: 40px; }
        .nav-links a { padding: 12px; display: block; color: #94a3b8; text-decoration: none; border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .nav-links a.active { background: var(--red); color: white; }

        /* CONTEÚDO PRINCIPAL */
        main { margin-left: 260px; padding: 40px; width: 100%; transition: 0.3s; }
        .box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #1e293b; margin-bottom: 20px; overflow-x: auto; }
        
        /* TABELAS RESPONSIVAS */
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; font-size: 11px; color: #94a3b8; padding: 10px; border-bottom: 1px solid #1e293b; text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid #0f172a; font-size: 13px; }

        /* RESPONSIVIDADE (CELULAR) */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            aside { 
                width: 100%; height: auto; position: relative; padding: 15px; 
                border-right: none; border-bottom: 1px solid #1e293b;
            }
            .nav-links { 
                display: flex; margin-top: 15px; overflow-x: auto; padding-bottom: 10px;
                gap: 10px; scrollbar-width: none;
            }
            .nav-links a { margin-bottom: 0; white-space: nowrap; padding: 8px 15px; font-size: 12px; }
            main { margin-left: 0; padding: 20px; }
            .stat-highlight { font-size: 24px; }
            h1 { font-size: 20px; }
            .btn-refresh { float: none; width: 100%; margin-bottom: 20px; }
        }

        .hidden { display: none; }
        .stat-highlight { font-size: 32px; font-weight: 700; color: var(--gold); margin-bottom: 15px; border-left: 4px solid var(--red); padding-left: 15px; }
        .progress-bar { background: #1e293b; height: 8px; border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; transition: 1s; }
        .btn-refresh { background: var(--gold); border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.2s; }
    </style>
</head>
<body onload="atualizarDashboard()">

    <aside>
        <h2 style="color:var(--gold); font-size: 20px; text-align: center;">SGV<span style="color:white">ULTRA</span></h2>
        <div class="nav-links">
            <a onclick="showPage('lucro')" id="m-lucro" class="active">💰 Lucro</a>
            <a onclick="showPage('estoque')" id="m-estoque">📦 Estoque</a>
            <a onclick="showPage('operacional')" id="m-operacional">🔌 Operacional</a>
            <a onclick="showPage('relatorios')" id="m-relatorios">📊 Relatórios</a>
            <a onclick="showPage('forms')" id="m-forms">📝 Forms</a>
        </div>
    </aside>

    <main>
        <div id="lucro" class="page">
            <button class="btn-refresh" onclick="atualizarDashboard()">🔄 Sincronizar Agora</button>
            <h1 style="margin-top: 10px;">Custo vs Lucro</h1>
            <p id="status" style="margin-bottom: 20px; color: #94a3b8; font-size: 12px;">Carregando dados...</p>

            <div class="box">
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Custo</th>
                            <th>Venda</th>
                            <th>Margem</th>
                        </tr>
                    </thead>
                    <tbody id="lista-custos"></tbody>
                </table>
            </div>

            <div class="box" style="border-color: var(--green);">
                <h3>Capital em Insumos</h3>
                <div class="stat-highlight" id="val-estoque" style="color: var(--green);">R$ 0,00</div>
            </div>
        </div>

        <div id="estoque" class="page hidden">
            <div class="box">
                <h2>Nível de Insumos</h2>
                <div id="monitor-estoque" style="margin-top: 20px;"></div>
            </div>
        </div>

        <div id="relatorios" class="page hidden">
            <div class="box">
                <h2>Histórico</h2>
                <div style="margin: 15px 0; display: flex; flex-direction: column; gap: 10px;">
                    <input type="date" id="input-data" style="padding: 12px; border-radius: 8px; background: #020617; color: white; border: 1px solid #1e293b;">
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-refresh" style="flex:1" onclick="buscarRelatorio()">🔍 Buscar</button>
                        <button class="btn-refresh" style="flex:1; background: var(--green);" onclick="salvarEstadoAtual()">💾 Salvar</button>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr><th>Produto</th><th>Custo</th><th>Venda</th><th>Margem</th></tr>
                    </thead>
                    <tbody id="lista-relatorio"></tbody>
                </table>
            </div>
        </div>

        </main>

    <script>
        const API = "COLE_SEU_LINK_AQUI"; // Substitua pelo seu link da nova implantação

        async function atualizarDashboard() {
            const statusEl = document.getElementById('status');
            statusEl.innerText = "Buscando dados na nuvem...";
            try {
                const res = await fetch(API, { redirect: 'follow' });
                const d = await res.json();
                
                // Preenche Insumos
                document.getElementById('val-estoque').innerText = d.valorEstoque;
                
                // Preenche Tabela Principal
                document.getElementById('lista-custos').innerHTML = d.producao.map(p => `
                    <tr>
                        <td><strong>${p.nome}</strong></td>
                        <td style="color:var(--gold)">R$ ${p.custoTotal.toFixed(2)}</td>
                        <td>${p.venda}</td>
                        <td style="font-weight:bold; color:var(--green)">${p.margem}</td>
                    </tr>
                `).join('');

                // Preenche Barras de Insumos
                document.getElementById('monitor-estoque').innerHTML = d.insumos.map(i => `
                    <div style="margin-bottom: 20px;">
                        <div style="display:flex; justify-content:space-between; font-size:12px;">
                            <span>${i.nome}</span><span>${i.qtd}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${i.percent}%; background:${i.percent < 30 ? 'var(--red)' : 'var(--green)'}"></div>
                        </div>
                    </div>
                `).join('');

                statusEl.innerText = "Última atualização: " + new Date().toLocaleTimeString();
            } catch (e) {
                statusEl.innerText = "Erro de conexão.";
                statusEl.style.color = "var(--red)";
            }
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('m-' + id).classList.add('active');
        }
        
        // As demais funções de Relatório e Salvar permanecem as mesmas que te passei anteriormente.
    </script>
</body>
</html>
